[env:esp32s3_hw678]
platform = espressif32
board = rymcu-esp32-s3-devkitc-1
framework = espidf

monitor_speed = 115200
upload_speed = 921600

build_type = debug

extra_scripts = pre:scripts/generate_version.py

build_flags =
    -Wall
    -Wextra
    -Werror